const branches = [
  { id: 'simple', name: '一般时态<span class="sub-label">Simple Tenses<br><span class="mn-label">Энгийн цагууд</span></span>', angle: -135, color: '#34d399', group: 'simple', children: ['simple-present', 'simple-past', 'simple-future'] },
  { id: 'continuous', name: '进行时态<span class="sub-label">Continuous Tenses<br><span class="mn-label">Үргэлжилсэн цагууд</span></span>', angle: -45, color: '#38bdf8', group: 'continuous', children: ['present-continuous', 'past-continuous', 'future-continuous'] },
  { id: 'perfect', name: '完成时态<span class="sub-label">Perfect Tenses<br><span class="mn-label">Гүйцэд цагууд</span></span>', angle: 45, color: '#a78bfa', group: 'perfect', children: ['present-perfect', 'past-perfect', 'future-perfect'] },
  { id: 'perfect-continuous', name: '完成进行时态<span class="sub-label">Perfect Continuous<br><span class="mn-label">Гүйцэд үргэлжилсэн</span></span>', angle: 135, color: '#fb7185', group: 'perfect-continuous', children: ['present-perfect-continuous', 'past-perfect-continuous', 'future-perfect-continuous'] }

// ==================== LAYOUT ====================
const canvas = document.getElementById('canvas');
const nodesLayer = document.getElementById('nodes-layer');
const svg = document.getElementById('lines-svg');
let centerX = window.innerWidth / 2, centerY = window.innerHeight / 2;
let panX = 0, panY = 0, isDragging = false, dragStartX, dragStartY;
let scale = 1;

function createNode(id, html, x, y, type, extra = {}) {
  const el = document.createElement('div');
  el.className = `node ${type}`;
  el.innerHTML = html;
  el.dataset.id = id;
  if (extra.group) el.dataset.group = extra.group;
  if (extra.color && type === 'branch') el.style.borderColor = extra.color;

  el.addEventListener('mouseenter', () => highlightPath(id));
  el.addEventListener('mouseleave', () => clearPathHighlight());

  if (type === 'leaf') {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openPanel(id);
      document.querySelectorAll('.node.leaf').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      highlightLines(id);
    });
  }
  if (type === 'branch') {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleBranch(id);
    });
  }
  nodesLayer.appendChild(el);
  return { id, x, y, el };
}

function createPath(x1, y1, x2, y2, color, width) {
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', width || 2);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke-linecap', 'round');
  path.dataset.color = color;
  path.dataset.width = width || 2;
  svg.appendChild(path);
  return path;
}

const nodes = [], lines = [];

function buildMap() {
  nodesLayer.innerHTML = ''; svg.innerHTML = ''; nodes.length = 0; lines.length = 0;
  const W = window.innerWidth;
  const H = window.innerHeight;
  centerX = W / 2;
  centerY = H / 2;

  // Estimated node sizes (padding + content)
  // Root: pill, ~220px wide; Branch: ~170px min + padding; Leaf: ~160px + padding
  const rootHalfW = 110, rootHalfH = 30;
  const branchHalfW = 90, branchHalfH = 28;
  const leafHalfW = 80, leafHalfH = 26;

  // Horizontal gaps (space between columns)
  const colGap1 = Math.max(60, W * 0.07); // root → branch
  const colGap2 = Math.max(50, W * 0.06); // branch → leaf
  const rightPad = W * 0.18; // leave room for panel on right
  const usableW = W - rightPad;
  const x0 = rootHalfW + 30; // root x (center)
  const x1 = x0 + rootHalfW + colGap1 + branchHalfW; // branch x (center)
  // Place leaf column so right edge of leaf doesn't exceed usableW
  let x2 = x1 + branchHalfW + colGap2 + leafHalfW;
  if (x2 + leafHalfW > usableW) x2 = usableW - leafHalfW;

  // Vertical distribution
  const branchCount = branches.length;
  const topPad = 40, bottomPad = 40;
  const availableH = H - topPad - bottomPad;
  const rootY = H / 2;

  // Leaf gap sized to fill available height
  const leafGap = Math.max(54, (availableH / branchCount) / 2.8);
  const branchSlotH = availableH / branchCount;
  const branchYs = [];
  for (let bi = 0; bi < branchCount; bi++) {
    branchYs.push(topPad + branchSlotH * (bi + 0.5));
  }

  // Create root
  nodes.push(createNode('root', '英文语法时态<span class="sub-label">English Grammar Tenses<br><span class="mn-label">Англи хэлний цаг хийм</span></span>', x0, rootY, 'root'));

  let seqNo = 0;
  branches.forEach((branch, bi) => {
    const by = branchYs[bi];
    nodes.push(createNode(branch.id, branch.name, x1, by, 'branch', { color: branch.color, group: branch.group }));
    lines.push({
      el: createPath(0, 0, 0, 0, branch.color, 3),
      from: 'root', to: branch.id,
      srcType: 'root', dstType: 'branch'
    });
    branch.children.forEach((childId, i) => {
      seqNo++;
      const ly = by + (i - 1) * leafGap;
      const d = tenseData[childId];
      const h = '<span class="seq-num">' + seqNo + '</span><span>' + d.name + '<span class="sub-label">' + d.en + '<br><span class="mn-label">' + d.mn + '</span></span></span>';
      nodes.push(createNode(childId, h, x2, ly, 'leaf', { group: branch.group }));
      lines.push({
        el: createPath(0, 0, 0, 0, branch.color, 1.5),
        from: branch.id, to: childId,
        srcType: 'branch', dstType: 'leaf'
      });
    });
  });

  updatePositions();

  // Entrance animation — left to right cascade
  nodes.forEach((n, i) => {
    n.el.style.opacity = '0';
    n.el.style.transform = 'translate(-50%, -50%) translateX(-40px) scale(0.8)';
    setTimeout(() => {
      n.el.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
      n.el.style.opacity = '1';
      n.el.style.transform = 'translate(-50%, -50%) translateX(0) scale(1)';
      setTimeout(() => { n.el.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)'; }, 500);
    }, i * 50);
  });
  lines.forEach((l, i) => {
    l.el.style.opacity = '0';
    setTimeout(() => {
      l.el.style.transition = 'opacity 0.4s ease';
      l.el.style.opacity = l.el.dataset.width === '3' ? '0.7' : '0.4';
    }, 200 + i * 35);
  });
}

function getNodeEdgePoint(node, direction) {
  const rect = node.el.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();
  const left = rect.left - canvasRect.left;
  const top = rect.top - canvasRect.top;
  if (direction === 'right') {
    return { x: left + rect.width, y: top + rect.height / 2 };
  } else {
    return { x: left, y: top + rect.height / 2 };
  }
}

function updatePositions() {
  nodes.forEach(n => {
    n.el.style.left = (centerX + (n.x - centerX) * scale + panX) + 'px';
    n.el.style.top = (centerY + (n.y - centerY) * scale + panY) + 'px';
  });
  // Connect lines to node edges using actual measurements
  requestAnimationFrame(() => {
    lines.forEach(l => {
      const f = nodes.find(n => n.id === l.from);
      const t = nodes.find(n => n.id === l.to);
      if (!f || !t) return;
      const p1 = getNodeEdgePoint(f, 'right');
      const p2 = getNodeEdgePoint(t, 'left');
      // Smooth horizontal bezier: control points offset horizontally
      const dx = p2.x - p1.x;
      const cp1x = p1.x + dx * 0.4;
      const cp1y = p1.y;
      const cp2x = p2.x - dx * 0.4;
      const cp2y = p2.y;
      l.el.setAttribute('d', `M ${p1.x} ${p1.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`);
    });
  });
}

function highlightLines(leafId) {
  const b = branches.find(b => b.children.includes(leafId));
  if (!b) return;
  lines.forEach(l => l.el.classList.remove('active'));
  lines.forEach(l => { if (l.to === leafId || (l.to === b.id && l.from === 'root') || (l.from === b.id && l.to === leafId)) l.el.classList.add('active'); });
}

function highlightPath(nodeId) {
  if (nodeId === 'root') return;
  const branch = branches.find(b => b.id === nodeId || b.children.includes(nodeId));
  if (!branch) return;
  lines.forEach(l => l.el.classList.remove('active'));
  if (branch.children.includes(nodeId)) {
    lines.forEach(l => { if (l.to === nodeId || (l.to === branch.id && l.from === 'root')) l.el.classList.add('active'); });
  } else {
    lines.forEach(l => { if (l.to === nodeId || l.from === nodeId) l.el.classList.add('active'); });
  }
}

function clearPathHighlight() {
  lines.forEach(l => l.el.classList.remove('active'));
}

// ==================== BRANCH COLLAPSE ====================
function toggleBranch(branchId) {
  const branch = branches.find(b => b.id === branchId);
  if (!branch) return;
  const branchNode = nodes.find(n => n.id === branchId);
  if (!branchNode) return;
  const isCollapsed = branchNode.el.dataset.collapsed === 'true';
  const willCollapse = !isCollapsed;
  branch.children.forEach(childId => {
    const node = nodes.find(n => n.id === childId);
    if (node) node.el.classList.toggle('collapsed', willCollapse);
  });
  lines.forEach(l => {
    if (l.from === branchId && branch.children.includes(l.to)) {
      l.el.classList.toggle('collapsed', willCollapse);
    }
  });
  branchNode.el.dataset.collapsed = willCollapse;
  branchNode.el.classList.toggle('collapsed', willCollapse);
}

// ==================== PAN & ZOOM ====================
canvas.addEventListener('mousedown', e => { if (e.target.closest('.node')) return; isDragging = true; dragStartX = e.clientX - panX; dragStartY = e.clientY - panY; canvas.classList.add('grabbing'); });
document.addEventListener('mousemove', e => { if (!isDragging) return; panX = e.clientX - dragStartX; panY = e.clientY - dragStartY; updatePositions(); });
document.addEventListener('mouseup', () => { isDragging = false; canvas.classList.remove('grabbing'); });
canvas.addEventListener('touchstart', e => { if (e.target.closest('.node')) return; isDragging = true; dragStartX = e.touches[0].clientX - panX; dragStartY = e.touches[0].clientY - panY; });
document.addEventListener('touchmove', e => { if (!isDragging) return; panX = e.touches[0].clientX - dragStartX; panY = e.touches[0].clientY - dragStartY; updatePositions(); });
document.addEventListener('touchend', () => { isDragging = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  scale = Math.max(0.3, Math.min(3, scale * delta));
  updatePositions();
}, { passive: false });

canvas.addEventListener('dblclick', e => {
  if (e.target.closest('.node')) return;
  scale = 1; panX = 0; panY = 0;
  updatePositions();
});

  document.getElementById('panel-en').textContent = data.en;
  document.getElementById('panel-mn').textContent = data.mn;
  const body = document.getElementById('panel-body');
  panel.classList.add('wide');
  body.innerHTML = `
    <div class="panel-section">
      <h3>定义 <span class="sec-mn">Тодорхойлолт</span></h3>
      <p>${data.desc}</p>
      <span class="mn-text">${data.descMn}</span>
    </div>
    <div class="panel-section">
      <h3>结构公式 <span class="sec-mn">Бүтэц</span></h3>
      <div class="formula-box">${data.formula}<span class="mn-formula">${data.formulaMn}</span></div>
    </div>
    <div class="panel-section">
      <h3>使用规则 <span class="sec-mn">Хэрэглэх дүрмүүд</span></h3>
      <ul>
        ${data.rules.map(r => `<li>${r.text}<span class="mn-text">${r.mn}</span></li>`).join('')}

      <h3>时间标志词 <span class="sec-mn">Цагийн тодотгогч үгс</span></h3>
      <div class="tag-list">
        ${data.keywords.split(', ').map(k => `<span class="tag">${k}</span>`).join('')}
      </div>
    </div>
    <div class="panel-section">
      <h3>10 个例句 <span class="sec-mn">10 жишээ өгүүлбэр</span></h3>
      <ul class="examples-list">
        ${data.examples.map((ex, i) => `
          <li>
            <span class="en"><span class="num">${i+1}</span>${ex.en}</span>
            <span class="cn">${ex.cn}</span>
            <span class="mn">${ex.mn}</span>
          </li>
        `).join('')}
      </ul>
    </div>
    ${renderExercises(id)}
  `;

}

function closePanel() {
  panel.classList.remove('open');
  setTimeout(() => panel.classList.remove('wide'), 400);
  document.querySelectorAll('.node.leaf').forEach(n => n.classList.remove('active'));
  lines.forEach(l => l.el.classList.remove('active'));
}
panel.addEventListener('click', e => e.stopPropagation());
document.addEventListener('click', e => { if (panel.classList.contains('open') && !e.target.closest('.node')) closePanel(); });

function renderExercises(tenseId) {
  const ex = exerciseData[tenseId];
  if (!ex) return '';
  let h = '<div class="panel-section"><h3>练习题目 <span class="sec-mn">Дасгал асуултууд</span></h3><div class="exercise-area">';
  h += '<h4>一、选择题（每题10分）<span class="ex-mn">I. Сонголтын асуулт</span></h4>';
  ex.choice.forEach((q, i) => {
    h += '<div class="question"><div class="q-text"><span class="q-num">'+(i+1)+'</span>'+q.question+'</div><div class="options">';
    q.options.forEach((o,oi) => { h += '<label><input type="radio" name="c-'+tenseId+'-'+i+'" value="'+oi+'">'+o+'</label>'; });
    h += '</div><div class="result-msg" id="res-c-'+tenseId+'-'+i+'"></div></div>';
  });
  h += '<h4>二、填空题（每题10分）<span class="ex-mn">II. Бөглөх асуулт</span></h4>';
  ex.fill.forEach((q, i) => {
    h += '<div class="question"><div class="q-text"><span class="q-num">'+(i+1)+'</span>'+q.question+'</div><div class="options"><input type="text" id="f-'+tenseId+'-'+i+'" placeholder="请填写答案 | Бөглөх"></div><div class="result-msg" id="res-f-'+tenseId+'-'+i+'"></div></div>';
  });
  h += '<h4>三、写句子（每题10分）<span class="ex-mn">III. Өгүүлбэр бичих</span></h4>';
  ex.write.forEach((q, i) => {
    h += '<div class="question"><div class="q-text"><span class="q-num">'+(i+1)+'</span>'+q.question+'</div><div class="options"><input type="text" id="w-'+tenseId+'-'+i+'" placeholder="请写出英文句子 | Англи өгүүлбэр бичих"></div><div class="result-msg" id="res-w-'+tenseId+'-'+i+'"></div></div>';
  });
  h += '<button class="btn-submit" onclick="submitAnswers(\''+tenseId+'\')">提交答案并评分</button>';
  h += '<div id="score-'+tenseId+'" style="display:none"></div></div></div>';
  return h;
}

function norm(s) { return s.toLowerCase().replace(/[\.\?\!\s]+/g, ' ').trim(); }
function checkWrite(input, pats) { const n = norm(input); return pats.some(p => n.includes(p.toLowerCase())); }

function submitAnswers(tid) {
  const ex = exerciseData[tid]; if (!ex) return;
  let sc = 0;
  ex.choice.forEach((q, i) => {
    const rs = document.getElementsByName('c-'+tid+'-'+i); let sel = -1;
    for (let r of rs) if (r.checked) sel = parseInt(r.value);
    const el = document.getElementById('res-c-'+tid+'-'+i);
    if (sel === q.answer) { sc++; el.className='result-msg correct'; el.textContent='✓ 正确！'+q.explain; }
    else { el.className='result-msg wrong'; el.textContent='✗ 错误。正确答案：'+q.options[q.answer]+'。'+q.explain; }
  });
  ex.fill.forEach((q, i) => {
    const v = document.getElementById('f-'+tid+'-'+i).value;
    const el = document.getElementById('res-f-'+tid+'-'+i);
    if (q.answers.some(a => norm(v) === norm(a))) { sc++; el.className='result-msg correct'; el.textContent='✓ 正确！'+q.explain; }
    else { el.className='result-msg wrong'; el.textContent='✗ 错误。参考答案：'+q.answers.join(' 或 ')+'。'+q.explain; }
  });
  ex.write.forEach((q, i) => {
    const v = document.getElementById('w-'+tid+'-'+i).value;
    const el = document.getElementById('res-w-'+tid+'-'+i);
    if (checkWrite(v, q.patterns) && v.trim().length > 5) { sc++; el.className='result-msg correct'; el.textContent='✓ 正确！'+q.explain; }
    else { el.className='result-msg wrong'; el.textContent='✗ 错误。参考答案：'+q.reference+'。'+q.explain; }
  });
  const pct = Math.round((sc/9)*100);
  let m = pct>=90 ? '完全掌握 🎉 | Бүрэн эзэмшсэн' : pct>=70 ? '基本掌握 👍 | Үндсэн эзэмшсэн' : pct>=50 ? '部分掌握 📚 | Хэсэгчлэн эзэмшсэн' : '尚未掌握 ⚠️ | Хараахан эзэмшээгүй';
  const bd = document.getElementById('score-'+tid);
  bd.style.display='block';
  bd.innerHTML='<div class="score-board"><div class="score-num">'+sc+'/9</div><div class="score-label">正确率 | Зөв хариулт '+pct+'%</div><div class="mastery">'+m+'</div></div>';
  bd.scrollIntoView({behavior:'smooth',block:'nearest'});
}
